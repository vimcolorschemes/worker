name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_REGISTRY_ID }}
      ECR_REPOSITORY: vimcolorschemes/worker
      ECS_TASK_FAMILY: run-job
      ECS_CONTAINER_NAME: vimcolorschemes-worker
      EVENTBRIDGE_RULES: import update generate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.AWS_REGISTRY_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/vimcolorschemes/worker:${{ github.sha }}
            ${{ vars.AWS_REGISTRY_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/vimcolorschemes/worker:latest

      - name: Deploy digest-pinned ECS revision
        id: taskdef
        shell: bash
        run: |
          chmod +x bin/deploy-ecs
          bin/deploy-ecs --digest "${{ steps.build.outputs.digest }}" --output-file "${GITHUB_OUTPUT}"

      - name: Deployment summary
        shell: bash
        run: |
          echo "Immutable image: ${{ steps.taskdef.outputs.immutable_image }}"
          echo "Task definition: ${{ steps.taskdef.outputs.task_definition_arn }}"
          echo "Updated rules: ${EVENTBRIDGE_RULES}"
